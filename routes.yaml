## routes.yaml

routes:
  /latest/:
    controller: channel
    permalink: /latest/
    template: index
    data: page.latest
    filter: tag:-[hash-newsletter,hash-event,hash-podcast,hash-sponsored]
  /cultura-reportagem/:
    controller: channel
    permalink: /cultura-reportagem/
    template: page-cultura-reportagem
    filter: primary_tag:cultura+tag:reportagem
  /cultura-resenha/:
    controller: channel
    permalink: /cultura-resenha/
    template: page-cultura-resenha
    filter: primary_tag:cultura+tag:resenha
  /parentese/:
    controller: channel
    permalink: /parentese/
    template: page-parentese
    data: page.parentese
    filter: primary_tag:newsletter+tag:parentese

collections:
  /newsletters/:
    permalink: /{slug}/
    template: page-newsletters
    data: page.newsletters
    filter: tag:[newsletter,hash-newsletter]
  /events/:
    permalink: /events/{slug}/
    template: page-events
    data: page.events
    filter: tag:[event,hash-event]
  /podcasts/:
    permalink: /podcasts/{slug}/
    template: page-podcasts
    data: page.podcasts
    filter: tag:[podcast,hash-podcast]
  /sponsored/:
    permalink: /{slug}/
    template: tag
    data: tag.sponsored
    filter: tag:[sponsored,hash-sponsored]
  /:
    permalink: /{primary_tag}/{slug}/
    template: index

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/